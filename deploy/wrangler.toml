name = "pi-digby"
main = "src/index.ts"
compatibility_date = "2025-04-03"

[[containers]]
class_name = "PiMomContainer"
image = "../Dockerfile"
max_instances = 1
instance_type = "standard-1"

[[durable_objects.bindings]]
name = "PI_MOM"
class_name = "PiMomContainer"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["PiMomContainer"]

# Auto-restart check every 5 minutes
[triggers]
crons = ["*/5 * * * *"]

[vars]
AWS_REGION = "us-east-1"
R2_ACCOUNT_ID = "b2012d69ea8f177952dca0201c5add58"
R2_BUCKET_NAME = "pi-digby-data"

[observability]
enabled = true
