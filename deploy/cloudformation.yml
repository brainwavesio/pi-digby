AWSTemplateFormatVersion: "2010-09-09"
Description: pi-digby - ECS Fargate infrastructure for the pi-digby Slack bot

Parameters:
  GitHubRepository:
    Type: String
    Description: "GitHub repository in owner/repo format — used to restrict the OIDC deploy role trust policy. No default: pass your fork explicitly (deliberately fails loud here rather than silently at OIDC auth time)."
    AllowedPattern: "^[^/]+/[^/]+$"
    ConstraintDescription: "must be owner/repo, e.g. your-org/pi-digby"

  ImageTag:
    Type: String
    Description: "Container image tag to deploy. CI passes the git SHA so the task definition pins an immutable artifact — a circuit-breaker rollback then re-pulls the exact previous image instead of a mutated :latest."
    Default: latest

  DesiredCount:
    Type: Number
    Description: "Number of bot tasks. Defaults to 0 so initial stack creation succeeds before any image exists in ECR — otherwise the service tries to pull from the empty repository this same template creates, the deployment circuit breaker trips, and stack creation rolls back. CI passes 1 on every deploy."
    Default: 0
    AllowedValues: [0, 1]

  CreateOIDCProvider:
    Type: String
    Description: "Whether to create the GitHub Actions OIDC identity provider. AWS allows only one provider per URL per account — set to false if your account already has token.actions.githubusercontent.com (the deploy role then references the existing provider)."
    Default: "true"
    AllowedValues: ["true", "false"]

  DatadogSite:
    Type: String
    Description: "Datadog site the container reports to (DD_SITE). Only relevant if DD_API_KEY is set in the secret."
    Default: datadoghq.com

  WikiBaseUrl:
    Type: String
    Description: "Public origin the wiki is served from, e.g. https://digby.example.com — no trailing slash. Used to build the Slack OAuth redirect_uri, so it must match a redirect URL registered on the Slack app. Leave empty to run with the wiki (/w/*) disabled."
    Default: ""

Conditions:
  ShouldCreateOIDCProvider: !Equals [!Ref CreateOIDCProvider, "true"]

Resources:
  # ===========================================================================
  # Networking
  # ===========================================================================

  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: pi-digby

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: pi-digby

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: pi-digby-public

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: us-east-1a
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: pi-digby-public-1a

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: us-east-1b
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: pi-digby-public-1b

  SubnetRouteTableAssociation1:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  SubnetRouteTableAssociation2:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref PublicRouteTable

  ECSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: pi-digby ECS tasks - egress only
      VpcId: !Ref VPC
      SecurityGroupEgress:
        - IpProtocol: "-1"
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: pi-digby-ecs

  EFSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: pi-digby EFS - allow NFS from ECS tasks
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          SourceSecurityGroupId: !Ref ECSSecurityGroup
      SecurityGroupEgress:
        - IpProtocol: "-1"
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: pi-digby-efs

  # ===========================================================================
  # Storage - EFS
  # ===========================================================================

  EFSFileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      Encrypted: true
      LifecyclePolicies:
        - TransitionToIA: AFTER_30_DAYS
      PerformanceMode: generalPurpose
      ThroughputMode: bursting
      FileSystemTags:
        - Key: Name
          Value: pi-digby

  EFSAccessPoint:
    Type: AWS::EFS::AccessPoint
    Properties:
      FileSystemId: !Ref EFSFileSystem
      PosixUser:
        Uid: "0"
        Gid: "0"
      RootDirectory:
        Path: /data
        CreationInfo:
          OwnerUid: "0"
          OwnerGid: "0"
          Permissions: "755"
      AccessPointTags:
        - Key: Name
          Value: pi-digby-data

  EFSMountTarget1:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EFSFileSystem
      SubnetId: !Ref PublicSubnet1
      SecurityGroups:
        - !Ref EFSSecurityGroup

  EFSMountTarget2:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EFSFileSystem
      SubnetId: !Ref PublicSubnet2
      SecurityGroups:
        - !Ref EFSSecurityGroup

  # ===========================================================================
  # Container Image - ECR
  # ===========================================================================

  ECRRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: pi-digby
      ImageTagMutability: MUTABLE
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "Keep last 10 images",
                "selection": {
                  "tagStatus": "any",
                  "countType": "imageCountMoreThan",
                  "countNumber": 10
                },
                "action": {
                  "type": "expire"
                }
              }
            ]
          }

  # ===========================================================================
  # Secrets
  # ===========================================================================

  # Secret contents are managed entirely via CLI (aws secretsmanager put-secret-value),
  # NOT via CloudFormation. The template only declares the resource so CF can provide a
  # stable ARN via !Ref Secret to the task definition and IAM policies. Do NOT add a
  # SecretString property — CF will try to reconcile it on every deploy, which either
  # requires broad Secrets Manager write permissions on the deploy role OR clobbers real
  # values with placeholders.
  #
  # On initial stack creation the secret is created empty. Populate it via:
  #   aws secretsmanager put-secret-value --secret-id pi-digby/env --secret-string file://pi-digby.json.env
  Secret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: pi-digby/env
      Description: pi-digby environment secrets (values managed via CLI, not CFN)

  # ===========================================================================
  # Logging
  # ===========================================================================

  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /ecs/pi-digby
      RetentionInDays: 30

  # ===========================================================================
  # IAM
  # ===========================================================================

  TaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: pi-digby-task-execution
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: secrets-access
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Ref Secret
        - PolicyName: logs-access
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !GetAtt LogGroup.Arn

  TaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: pi-digby-task
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: bedrock-invoke
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                Resource: "*"
        - PolicyName: ecs-exec
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ssmmessages:CreateControlChannel
                  - ssmmessages:CreateDataChannel
                  - ssmmessages:OpenControlChannel
                  - ssmmessages:OpenDataChannel
                Resource: "*"
        - PolicyName: self-observability
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:GetLogEvents
                  - logs:FilterLogEvents
                  - logs:DescribeLogStreams
                Resource: !Sub "arn:aws:logs:us-east-1:${AWS::AccountId}:log-group:/ecs/pi-digby:*"
              - Effect: Allow
                Action:
                  - ecs:DescribeTasks
                  - ecs:DescribeServices
                  - ecs:ListTasks
                Resource: "*"
                Condition:
                  ArnEquals:
                    ecs:cluster: !GetAtt ECSCluster.Arn
              - Effect: Allow
                Action:
                  - cloudwatch:GetMetricData
                  - cloudwatch:GetMetricStatistics
                Resource: "*"

  # GitHub OIDC Provider (skipped when CreateOIDCProvider=false — one per account)
  GitHubOIDCProvider:
    Type: AWS::IAM::OIDCProvider
    Condition: ShouldCreateOIDCProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
      ThumbprintList:
        - 6938fd4d98bab03faadb97b34396831e3780aea1
        - 1c58a3a8518e8759bf075b76b750d4f2df264fcd

  GitHubDeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: pi-digby-github-deploy
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: !If
                - ShouldCreateOIDCProvider
                - !Ref GitHubOIDCProvider
                - !Sub "arn:aws:iam::${AWS::AccountId}:oidc-provider/token.actions.githubusercontent.com"
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringLike:
                # Two patterns: repositories created after 2026-07-15 emit the
                # immutable subject format repo:owner@<id>/repo@<id>:..., older
                # ones the legacy repo:owner/repo:... — a fresh fork gets the
                # new format, so the trust policy must accept both.
                # https://github.blog/changelog/2026-04-23-immutable-subject-claims-for-github-actions-oidc-tokens/
                token.actions.githubusercontent.com:sub:
                  - !Sub "repo:${GitHubRepository}:*"
                  - !Sub
                    - "repo:${Owner}@*/${Repo}@*:*"
                    - Owner: !Select [0, !Split ["/", !Ref GitHubRepository]]
                      Repo: !Select [1, !Split ["/", !Ref GitHubRepository]]
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
      Policies:
        - PolicyName: ecr-push
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ecr:GetAuthorizationToken
                Resource: "*"
              - Effect: Allow
                Action:
                  - ecr:BatchCheckLayerAvailability
                  - ecr:GetDownloadUrlForLayer
                  - ecr:BatchGetImage
                  - ecr:PutImage
                  - ecr:InitiateLayerUpload
                  - ecr:UploadLayerPart
                  - ecr:CompleteLayerUpload
                Resource: !GetAtt ECRRepository.Arn
        - PolicyName: ecs-deploy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ecs:UpdateService
                  - ecs:DescribeServices
                  - ecs:DescribeTasks
                  - ecs:ListTasks
                  - ecs:DescribeTaskDefinition
                  - ecs:RegisterTaskDefinition
                Resource: "*"
              - Effect: Allow
                Action:
                  - iam:PassRole
                Resource:
                  - !GetAtt TaskExecutionRole.Arn
                  - !GetAtt TaskRole.Arn
        - PolicyName: cloudformation-deploy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - cloudformation:DescribeStacks
                  - cloudformation:DescribeStackEvents
                  - cloudformation:CreateChangeSet
                  - cloudformation:ExecuteChangeSet
                  - cloudformation:DescribeChangeSet
                  - cloudformation:GetTemplateSummary
                Resource: !Sub "arn:aws:cloudformation:us-east-1:${AWS::AccountId}:stack/pi-digby/*"
              # IAM: read + policy updates only (role creation requires admin CLI)
              - Effect: Allow
                Action:
                  - iam:GetRole
                  - iam:GetRolePolicy
                  - iam:PutRolePolicy
                  - iam:DeleteRolePolicy
                  - iam:TagRole
                Resource: !Sub "arn:aws:iam::${AWS::AccountId}:role/pi-digby-*"
              # Read-only describe across services (required by CF to diff state)
              - Effect: Allow
                Action:
                  - ec2:Describe*
                  - efs:Describe*
                  - ecs:Describe*
                  - ecr:Describe*
                  - logs:Describe*
                  - secretsmanager:Describe*
                  - backup:Describe*
                Resource: "*"
              # Secrets Manager: CF needs GetSecretValue to diff the Secret resource
              # during stack updates. Write permissions are intentionally NOT granted —
              # secret values are managed via CLI, not CloudFormation (see Secret
              # resource definition above).
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:pi-digby/env-*"
              # Scoped write actions for pi-digby resources
              - Effect: Allow
                Action:
                  - ecs:CreateCluster
                  - ecs:UpdateCluster
                  - ecs:DeleteCluster
                Resource: !Sub "arn:aws:ecs:us-east-1:${AWS::AccountId}:cluster/pi-digby"
              - Effect: Allow
                Action:
                  - ecs:CreateService
                  - ecs:UpdateService
                  - ecs:DeleteService
                Resource: !Sub "arn:aws:ecs:us-east-1:${AWS::AccountId}:service/pi-digby/*"
              - Effect: Allow
                Action:
                  - ecs:RegisterTaskDefinition
                  - ecs:DeregisterTaskDefinition
                Resource: "*"
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:DeleteLogGroup
                  - logs:PutRetentionPolicy
                Resource: !Sub "arn:aws:logs:us-east-1:${AWS::AccountId}:log-group:/ecs/pi-digby:*"
              - Effect: Allow
                Action:
                  - backup:CreateBackupVault
                  - backup:DeleteBackupVault
                  - backup:CreateBackupPlan
                  - backup:DeleteBackupPlan
                  - backup:UpdateBackupPlan
                  - backup:CreateBackupSelection
                  - backup:DeleteBackupSelection
                Resource:
                  - !Sub "arn:aws:backup:us-east-1:${AWS::AccountId}:backup-vault:pi-digby"
                  - !Sub "arn:aws:backup:us-east-1:${AWS::AccountId}:backup-plan:*"

  # ===========================================================================
  # Compute - ECS
  # ===========================================================================

  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: pi-digby
      CapacityProviders:
        - FARGATE
      DefaultCapacityProviderStrategy:
        - CapacityProvider: FARGATE
          Weight: 1

  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: pi-digby
      Cpu: "1024"
      Memory: "2048"
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn: !GetAtt TaskExecutionRole.Arn
      TaskRoleArn: !GetAtt TaskRole.Arn
      Volumes:
        - Name: efs-data
          EFSVolumeConfiguration:
            FilesystemId: !Ref EFSFileSystem
            TransitEncryption: ENABLED
            AuthorizationConfig:
              AccessPointId: !Ref EFSAccessPoint
              IAM: DISABLED
      ContainerDefinitions:
        - Name: pi-digby
          Image: !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/pi-digby:${ImageTag}"
          Essential: true
          MountPoints:
            - SourceVolume: efs-data
              ContainerPath: /data
              ReadOnly: false
          Environment:
            - Name: AWS_DEFAULT_REGION
              Value: !Ref AWS::Region
            - Name: DD_SITE
              Value: !Ref DatadogSite
            - Name: DIGBY_WIKI_BASE_URL
              Value: !Ref WikiBaseUrl
          Secrets:
            - Name: DIGBY_SLACK_APP_TOKEN
              ValueFrom: !Sub "${Secret}:DIGBY_SLACK_APP_TOKEN::"
            - Name: DIGBY_SLACK_BOT_TOKEN
              ValueFrom: !Sub "${Secret}:DIGBY_SLACK_BOT_TOKEN::"
            # AWS credentials provided by ECS task role (pi-digby-task) — no IAM user needed
            - Name: BROWSER_USE_API_KEY
              ValueFrom: !Sub "${Secret}:BROWSER_USE_API_KEY::"
            - Name: EXA_API_KEY
              ValueFrom: !Sub "${Secret}:EXA_API_KEY::"
            - Name: GH_TOKEN
              ValueFrom: !Sub "${Secret}:GH_TOKEN::"
            - Name: DD_API_KEY
              ValueFrom: !Sub "${Secret}:DD_API_KEY::"
            - Name: DD_APP_KEY
              ValueFrom: !Sub "${Secret}:DD_APP_KEY::"
            - Name: LINEAR_API_KEY
              ValueFrom: !Sub "${Secret}:LINEAR_API_KEY::"
            - Name: LINEAR_WEBHOOK_SECRET
              ValueFrom: !Sub "${Secret}:LINEAR_WEBHOOK_SECRET::"
            - Name: CLOUDFLARE_TUNNEL_TOKEN
              ValueFrom: !Sub "${Secret}:CLOUDFLARE_TUNNEL_TOKEN::"
            # Wiki (/w/*) — sign-in-with-Slack OAuth + signed session cookie.
            # All four must be set together; missing any disables /w/*.
            - Name: DIGBY_COOKIE_SECRET
              ValueFrom: !Sub "${Secret}:DIGBY_COOKIE_SECRET::"
            - Name: DIGBY_SLACK_CLIENT_ID
              ValueFrom: !Sub "${Secret}:DIGBY_SLACK_CLIENT_ID::"
            - Name: DIGBY_SLACK_CLIENT_SECRET
              ValueFrom: !Sub "${Secret}:DIGBY_SLACK_CLIENT_SECRET::"
            - Name: DIGBY_SLACK_TEAM_ID
              ValueFrom: !Sub "${Secret}:DIGBY_SLACK_TEAM_ID::"
          HealthCheck:
            Command:
              - CMD-SHELL
              - curl -f http://localhost:8080/health || exit 1
            Interval: 30
            Timeout: 5
            Retries: 3
            StartPeriod: 60
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: ecs

  ECSService:
    Type: AWS::ECS::Service
    DependsOn:
      - EFSMountTarget1
      - EFSMountTarget2
    Properties:
      ServiceName: pi-digby
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref TaskDefinition
      DesiredCount: !Ref DesiredCount
      LaunchType: FARGATE
      PlatformVersion: LATEST
      EnableExecuteCommand: true
      DeploymentConfiguration:
        MinimumHealthyPercent: 0
        MaximumPercent: 100
        # Abort + roll back a deploy whose tasks never reach a healthy steady
        # state, instead of blocking until the CloudFormation timeout.
        DeploymentCircuitBreaker:
          Enable: true
          Rollback: true
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          Subnets:
            - !Ref PublicSubnet1
            - !Ref PublicSubnet2
          SecurityGroups:
            - !Ref ECSSecurityGroup

# ===========================================================================
# Backup - daily EFS snapshots via AWS Backup, 5-day retention
# ===========================================================================

  BackupVault:
    Type: AWS::Backup::BackupVault
    Properties:
      BackupVaultName: pi-digby

  BackupPlan:
    Type: AWS::Backup::BackupPlan
    Properties:
      BackupPlan:
        BackupPlanName: pi-digby-daily
        BackupPlanRule:
          - RuleName: daily-5-day-retention
            TargetBackupVault: !Ref BackupVault
            ScheduleExpression: "cron(0 3 * * ? *)"
            StartWindowMinutes: 60
            CompletionWindowMinutes: 180
            Lifecycle:
              DeleteAfterDays: 5

  BackupRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: pi-digby-backup
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: backup.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSBackupServiceRolePolicyForBackup
        - arn:aws:iam::aws:policy/service-role/AWSBackupServiceRolePolicyForRestores

  BackupSelection:
    Type: AWS::Backup::BackupSelection
    Properties:
      BackupPlanId: !Ref BackupPlan
      BackupSelection:
        SelectionName: pi-digby-efs
        IamRoleArn: !GetAtt BackupRole.Arn
        Resources:
          - !GetAtt EFSFileSystem.Arn

# ===========================================================================
# Outputs
# ===========================================================================

Outputs:
  ECSClusterName:
    Description: ECS cluster name
    Value: !Ref ECSCluster

  ECSServiceName:
    Description: ECS service name
    Value: !GetAtt ECSService.Name

  ECRRepositoryUri:
    Description: ECR repository URI
    Value: !GetAtt ECRRepository.RepositoryUri

  EFSFileSystemId:
    Description: EFS file system ID
    Value: !Ref EFSFileSystem

  GitHubDeployRoleArn:
    Description: IAM role ARN for GitHub Actions OIDC deploy
    Value: !GetAtt GitHubDeployRole.Arn

  VPCId:
    Description: VPC ID
    Value: !Ref VPC
