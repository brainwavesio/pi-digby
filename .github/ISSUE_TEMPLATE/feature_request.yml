name: Feature Request
description: Propose a new feature or improvement for Digby
labels: ["enhancement"]
body:
  - type: input
    id: summary
    attributes:
      label: Summary
      description: A short description of the feature you'd like.
      placeholder: "e.g. Add support for thread replies in event handler"
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem this solves
      description: What pain point or gap does this address?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the solution you have in mind.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you thought about?
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, links, related issues, or anything else that helps.
    validations:
      required: false
