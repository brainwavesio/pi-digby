name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: pi-digby

concurrency:
  group: deploy
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    # Native ARM64 runner: the image is linux/arm64, so building here avoids
    # emulating every npm postinstall under QEMU. node-llama-cpp's postinstall
    # executes its prebuilt binary to self-test it, and on failure falls back to
    # compiling llama.cpp from source — an hours-long build under emulation.
    runs-on: ubuntu-24.04-arm
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/pi-digby-github-deploy
          aws-region: ${{ env.AWS_REGION }}

      # Build and push the image BEFORE CloudFormation. The task definition pins
      # the image by git SHA (ImageTag), so the SHA-tagged image must exist in
      # ECR before CloudFormation registers the task definition that references
      # it. CloudFormation then performs the single rolling deployment and waits
      # for the service to stabilise — the deployment circuit breaker rolls back
      # (and fails this job) if the new tasks never become healthy.
      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update infrastructure (CloudFormation)
        run: |
          aws cloudformation deploy \
            --stack-name pi-digby \
            --template-file deploy/cloudformation.yml \
            --capabilities CAPABILITY_IAM CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset \
            --region ${{ env.AWS_REGION }} \
            --parameter-overrides \
              GitHubRepository=${{ github.repository }} \
              ImageTag=${{ github.sha }} \
              WikiBaseUrl="${{ vars.WIKI_BASE_URL }}"
