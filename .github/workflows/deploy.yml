name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache deploy dependencies
        uses: actions/cache@v4
        with:
          path: deploy/node_modules
          key: deploy-node-modules-${{ hashFiles('deploy/package.json') }}

      - run: npm install
        working-directory: deploy

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prime Docker layer cache
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Cloudflare
        id: deploy
        run: |
          SHA="${{ github.sha }}"
          SHORT_SHA="${SHA:0:7}"
          echo "sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          OUTPUT=$(npx wrangler deploy --var "DEPLOY_SHA:$SHORT_SHA" 2>&1) || {
            echo "$OUTPUT"
            exit 1
          }
          echo "$OUTPUT"
          URL=$(echo "$OUTPUT" | grep -oP 'https://[^\s]+\.workers\.dev' | head -1)
          echo "url=$URL" >> "$GITHUB_OUTPUT"
        working-directory: deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Trigger health check
        run: |
          URL="${{ steps.deploy.outputs.url }}"
          SHA="${{ steps.deploy.outputs.sha }}"
          if [ -z "$URL" ]; then
            echo "No worker URL found, skipping"
            exit 0
          fi

          # Poll until the new Worker version is live
          echo "Waiting for deploy $SHA to propagate..."
          for i in $(seq 1 60); do
            STATUS=$(curl -sf "$URL/status" 2>/dev/null || echo '{}')
            LIVE_SHA=$(echo "$STATUS" | grep -oP '"deploySha"\s*:\s*"\K[^"]+' || echo "")
            if [ "$LIVE_SHA" = "$SHA" ]; then
              echo "Worker updated to $SHA"
              # checkHealth runs on every /status request — it will detect the
              # new deploySha and force a clean container restart automatically.
              # Poll until the container is up.
              for j in $(seq 1 30); do
                sleep 4
                STATUS=$(curl -sf "$URL/status" 2>/dev/null || echo '{}')
                echo "  $STATUS"
                if echo "$STATUS" | grep -qE '"(running|healthy)"'; then
                  echo "Container is up on $SHA!"
                  exit 0
                fi
              done
              echo "WARNING: Container not running yet (cron will retry within 2min)"
              exit 0
            fi
            echo "  Attempt $i: live=$LIVE_SHA, want=$SHA"
            sleep 4
          done

          echo "WARNING: Deploy $SHA did not propagate after 4min (cron will retry within 2min)"
