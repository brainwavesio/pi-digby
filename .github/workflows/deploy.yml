name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache deploy dependencies
        uses: actions/cache@v4
        with:
          path: deploy/node_modules
          key: deploy-node-modules-${{ hashFiles('deploy/package.json') }}

      - run: npm install
        working-directory: deploy

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prime Docker layer cache
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Cloudflare
        id: deploy
        run: |
          OUTPUT=$(npx wrangler deploy 2>&1)
          echo "$OUTPUT"
          URL=$(echo "$OUTPUT" | grep -oP 'https://[^\s]+\.workers\.dev' | head -1)
          echo "url=$URL" >> "$GITHUB_OUTPUT"
        working-directory: deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Restart container
        run: |
          URL="${{ steps.deploy.outputs.url }}"
          if [ -z "$URL" ]; then
            echo "No worker URL found, skipping restart"
            exit 0
          fi

          # Wait for image to propagate before restarting
          echo "Waiting 60s for container image to propagate..."
          sleep 60

          # Retry restart up to 5 times with 30s between attempts
          for i in 1 2 3 4 5; do
            echo "Restart attempt $i..."
            if curl -sf "$URL/restart" -o /dev/null; then
              echo "Restart triggered, waiting for container to come up..."
              # Poll status for up to 120s
              for j in $(seq 1 12); do
                sleep 10
                STATUS=$(curl -sf "$URL/status" 2>/dev/null || echo '{}')
                echo "  Status: $STATUS"
                if echo "$STATUS" | grep -qE '"(running|healthy)"'; then
                  echo "Container is running!"
                  exit 0
                fi
              done
              echo "Container not running yet after restart attempt $i"
            else
              echo "Restart request failed on attempt $i"
            fi
            [ "$i" -lt 5 ] && sleep 30
          done

          echo "WARNING: Container did not come up after all attempts (will start on next cron)"
