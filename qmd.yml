collections:
  memory:
    path: /data/memory
    pattern: "**/*.md"
    context: "Global workspace memory, notes, and daily summaries"
  channels:
    path: /data
    pattern: "*/memory/**/*.md"
    context: "Per-channel memory, daily summaries, and notes"
  skills:
    path: /data
    pattern: "**/skills/**/SKILL.md"
    context: "Reusable CLI tool definitions"
